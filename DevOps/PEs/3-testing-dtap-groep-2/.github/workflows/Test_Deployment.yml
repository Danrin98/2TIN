name: Test_Deployment

on:
 workflow_dispatch:

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout
     uses: actions/checkout@v5.0.0
     
   - name: Setup Node.js environment
     uses: actions/setup-node@v4
     with: 
      node-version: '20'

   - name: Install dependencies
     run: npm install

   - name: Login to Docker Hub
     uses: docker/login-action@v3
     with:
      username: ${{ vars.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

   - name: Build and push artifact
     uses: docker/build-push-action@v6
     with:
      push: true
      tags: ${{ vars.DOCKERHUB_USERNAME }}/git:latest

   - name: Deployment
     uses: appleboy/ssh-action@v1
     with:
      host: ${{ vars.TEST_IP }}
      username: ubuntu
      key: ${{ secrets.SSH_KEY }}
      port: 22
      script: |
       docker pull ${{ vars.DOCKERHUB_USERNAME }}/calculator-app-finished:latest
       docker stop calculator-app-finished || true
       docker rm calculator-app-finished || true
       docker run -d --name calculator-app-finished -p 3000:3000 ${{ vars.DOCKERHUB_USERNAME }}/calculator-app-finished:latest