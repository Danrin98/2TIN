---
- name: Database server (db group)
  hosts: db
  become: true

  tasks:
    - name: Install MariaDB
      ansible.builtin.dnf:
        name: mariadb-server
        state: present
      tags:
       database

    - name: Start MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true
      tags:
       database

- name: Application server (app group)
  hosts: app
  become: true

  tasks:
    - name: Install Python
      ansible.builtin.dnf:
        name: 
         - python3
         - python3-pip
        state: present
      tags:
       application

    - name: Deploy application
      ansible.builtin.copy:
        src: app/
        dest: /opt/myapp/
      tags:
       application