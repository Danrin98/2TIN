    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        POSTGRES-BASIC-SETTINGS-TEST_RESULTS: "${{steps.postgres-basic-settings-test.outputs.result}}"
        POSTGRES-WEB-TEST_RESULTS: "${{steps.postgres-web-test.outputs.result}}"
        LOADBALANCER-GENERAL-TEST_RESULTS: "${{steps.loadbalancer-general-test.outputs.result}}"
        LOADBALANCER-LISTENER-TEST_RESULTS: "${{steps.loadbalancer-listener-test.outputs.result}}"
        LOADBALANCER-WEB-TEST_RESULTS: "${{steps.loadbalancer-web-test.outputs.result}}"
        GET-STUDENTS-TEST_RESULTS: "${{steps.get-students-test.outputs.result}}"
        POST-STUDENTS-TEST_RESULTS: "${{steps.post-students-test.outputs.result}}"
        AGW-HASH-TEST_RESULTS: "${{steps.agw-hash-test.outputs.result}}"
        AGW-HASH-WEB-TEST_RESULTS: "${{steps.agw-hash-web-test.outputs.result}}"
        AGW-STUDENT-POST-TEST_RESULTS: "${{steps.agw-student-post-test.outputs.result}}"
        AGW-STUDENT-POST-WEB-TEST_RESULTS: "${{steps.agw-student-post-web-test.outputs.result}}"
        AGW-STUDENT-GET-TEST_RESULTS: "${{steps.agw-student-get-test.outputs.result}}"
        AGW-STUDENT-GET-WEB-TEST_RESULTS: "${{steps.agw-student-get-web-test.outputs.result}}"
        AGW-DEPLOYMENT-TEST_RESULTS: "${{steps.agw-deployment-test.outputs.result}}"
      with:
        runners: postgres-basic-settings-test, postgres-web-test, loadbalancer-general-test, loadbalancer-listener-test, loadbalancer-web-test, get-students-test, post-students-test, agw-hash-test, agw-hash-web-test, agw-student-post-test, agw-student-post-web-test, agw-student-get-test, agw-student-get-web-test, agw-deployment-test
