name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]' && github.event.head_commit.message == 'einde examen'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: postgres-basic-settings test
      id: postgres-basic-settings-test
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: postgres-basic-settings test
        setup-command: cd .github/aws-autograde && npm i
        command: export $(grep -v '^#' creds.txt | xargs) && node .github/aws-autograde/postgres.js
        input: ''
        expected-output: correct
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: postgres-web test
      id: postgres-web-test
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: postgres-web test
        setup-command: cd .github/aws-autograde && npm i
        command: export $(grep -v '^#' creds.txt | xargs) && node .github/aws-autograde/postgres-web.js
        input: ''
        expected-output: correct
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: loadbalancer-general test
